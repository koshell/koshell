name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  bun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Bun is the whole JS toolchain: package manager, task runner, test runner,
      # daemon runtime, and packager. It drives tsc/eslint/prettier too.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - run: bun install --frozen-lockfile
      - run: bun run check
      # Protocol smoke against both the TS source under Bun and the compiled binary.
      - run: bun run --filter '@koshell/ai-daemon' smoke
      - run: bun run --filter '@koshell/ai-daemon' smoke:binary
